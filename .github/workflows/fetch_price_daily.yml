name: Fetch Price Daily

on:
  schedule:
    - cron: "30 6 * * 1-5"  # 平日 06:30 UTC(JST 15:30、引け後)
  workflow_dispatch: {}

concurrency:
  group: stock-db
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/fetch_price_daily.py
      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock.db
          git diff --cached --quiet || git commit -m "chore: update daily prices $(date -u +%Y-%m-%d)"
          git push
