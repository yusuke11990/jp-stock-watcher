name: Fetch Price Daily

on:
  schedule:
    - cron: "30 6 * * 1-5"  # 平日 06:30 UTC(JST 15:30、引け後)
  workflow_dispatch: {}

concurrency:
  group: stock-db
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch price data
        run: python scripts/fetch_price_daily.py
        # 鮮度チェックで異常(sys.exit(1))があってもDBの取得結果自体は既にcommit済みなので、
        # コミット・pushは継続させてジョブ全体を失敗表示にすることで異常を可視化する
      - name: Commit updated DB
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock.db
          git diff --cached --quiet || git commit -m "chore: update daily prices $(date -u +%Y-%m-%d)"
          git push || (
            git fetch origin main &&
            git merge -X ours origin/main --no-edit -m "merge: resolve concurrent db push" &&
            git push
          )
