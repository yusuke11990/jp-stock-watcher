name: Fetch Tickers

on:
  schedule:
    - cron: "0 0 1 * *"  # 毎月1日 00:00 UTC(JST 09:00)
  workflow_dispatch: {}

concurrency:
  group: stock-db
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/fetch_tickers.py
      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock.db
          git diff --cached --quiet || git commit -m "chore: update tickers $(date -u +%Y-%m-%d)"
          git push || (
            git fetch origin main &&
            git merge -X ours origin/main --no-edit -m "merge: resolve concurrent db push" &&
            git push
          )
