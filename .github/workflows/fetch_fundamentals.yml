name: Fetch Fundamentals (Rolling)

on:
  schedule:
    - cron: "40 6 * * 1-5"  # 平日 06:40 UTC(JST 15:40、価格取得の後)
  workflow_dispatch: {}

concurrency:
  group: stock-db
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/fetch_fundamentals.py --time-budget-sec 1800
      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock.db
          git diff --cached --quiet || git commit -m "chore: update fundamentals (rolling) $(date -u +%Y-%m-%d)"
          git push || (
            git fetch origin main &&
            git merge -X ours origin/main --no-edit -m "merge: resolve concurrent db push" &&
            git push
          )
