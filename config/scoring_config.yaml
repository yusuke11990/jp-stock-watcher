min_sector_sample_size: 5

# 業種内パーセンタイルだけだと「業種全体が絶対的に割安/割高」という情報が消える
# (例: 海運業は全社PBR1倍割れなので、業種内順位では日本郵船のPBR0.71倍が中位止まり)。
# scripts/backtest/valuation_score_blend_backtest.py で検証: 2021-2025年度の全コホートで
# 業種内→市場全体パーセンタイルへ寄せるほどIC・五分位スプレッドが単調改善(前半/後半に
# 分割しても同じ傾向、過学習ではなさそう)。ただし完全に市場全体(1.0)にすると銀行・REIT等
# 構造的にPBR/PERが低い業種に偏るリスクがあるため、0.5(半々)で妥協。valuation以外は未検証。
category_market_blend_weight:
  valuation: 0.5

# quality_score_v2_backtest.py(2017〜2025年度の9コホート、12ヶ月後リターン)での
# 単軸IC実測値: valuation=+0.168(圧倒的最強), profitability=+0.034, efficiency=+0.030,
# shareholder_return=+0.022, safety=+0.015, growth=+0.011, momentum(逆張り)=+0.032
# を踏まえてIC上位を厚めに配分。growth/safetyは効果が薄かったため縮小した。
category_weights:
  valuation: 0.30
  profitability: 0.18
  efficiency: 0.15
  momentum: 0.15
  shareholder_return: 0.10
  safety: 0.07
  growth: 0.05

grade_thresholds:
  S: 85
  A: 70
  B: 55
  C: 40
  D: 25
  # E: 25未満

category_metrics:
  safety:
    - {col: equity_ratio, higher_is_better: true, weight: 0.30}
    - {col: current_ratio, higher_is_better: true, weight: 0.20}
    - {col: interest_bearing_debt_to_market_cap, higher_is_better: false, weight: 0.20}
    - {col: net_debt_to_ebitda, higher_is_better: false, weight: 0.15}
    - {col: interest_coverage_ratio, higher_is_better: true, weight: 0.15}
  growth:
    - {col: revenue_growth_1y, higher_is_better: true, weight: 0.20}
    - {col: revenue_growth_3y_cagr, higher_is_better: true, weight: 0.25}
    - {col: operating_income_growth_1y, higher_is_better: true, weight: 0.15}
    - {col: ordinary_income_growth_1y, higher_is_better: true, weight: 0.15}
    - {col: eps_growth_1y, higher_is_better: true, weight: 0.15}
    - {col: eps_growth_3y_cagr, higher_is_better: true, weight: 0.10}
  profitability:
    - {col: roe, higher_is_better: true, weight: 0.25}
    - {col: operating_margin, higher_is_better: true, weight: 0.25}
    - {col: net_margin, higher_is_better: true, weight: 0.20}
    - {col: ordinary_income_margin, higher_is_better: true, weight: 0.15}
    - {col: operating_cf_margin, higher_is_better: true, weight: 0.15}
  efficiency:
    - {col: roa, higher_is_better: true, weight: 0.50}
    - {col: asset_turnover, higher_is_better: true, weight: 0.50}
  valuation:
    - {col: per, higher_is_better: false, weight: 0.35}
    - {col: pbr, higher_is_better: false, weight: 0.30}
    - {col: psr, higher_is_better: false, weight: 0.20}
    - {col: pcfr, higher_is_better: false, weight: 0.15}
  shareholder_return:
    - {col: dividend_yield, higher_is_better: true, weight: 0.25}
    - {col: payout_ratio, special: payout_ratio_logic, weight: 0.15}
    - {col: total_shareholder_return_yield, higher_is_better: true, weight: 0.20}
    - {col: dividend_history_count, higher_is_better: true, weight: 0.10}
    - {col: doe, higher_is_better: true, weight: 0.15}
    - {col: dividend_growth_1y, higher_is_better: true, weight: 0.15}
  # 直近12ヶ月(直近1ヶ月除く)の株価騰落率。higher_is_better: false = 逆張り
  # (下落した銘柄ほど高スコア)。バックテストで順張りより逆張り方向にICが出たため。
  momentum:
    - {col: momentum_12_1, higher_is_better: false, weight: 1.0}
